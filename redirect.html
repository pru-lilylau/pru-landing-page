<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>免費保障缺口計算機 | 識數嘅媽媽理財師 Lily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#003865;
    --navy-deep:#00223d;
    --milk:#C4A882;
    --milk-light:#E8DDC9;
    --cream:#FBF8F3;
    --paper:#FFFFFF;
    --ink:#1D2B36;
    --ink-soft:#5A6B78;
    --line:#E4DCCB;
    --good:#3E7C5A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Noto Sans TC', sans-serif;
    background:var(--cream);
    color:var(--ink);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Noto Serif TC', serif;}

  /* ---------- Profile hero (matches calculator page) ---------- */
  .profile-hero{
    background:linear-gradient(180deg, #EDE2CC 0%, #F6F1E6 100%);
    padding:38px 20px 30px;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  .avatar{
    width:88px;height:88px;
    border-radius:50%;
    overflow:hidden;
    margin:0 auto 14px;
    border:3px solid #fff;
    box-shadow:0 2px 10px rgba(0,56,101,.12);
  }
  .avatar img{width:100%;height:100%;object-fit:cover;display:block;}
  .profile-name{
    font-size:21px;font-weight:700;color:var(--navy-deep);
    margin-bottom:3px;
  }
  .profile-handle{
    font-size:14px;color:var(--ink-soft);
    margin-bottom:14px;
  }
  .badge-row{
    display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
  }
  .badge{
    font-size:12.5px;font-weight:700;
    padding:6px 14px;border-radius:999px;
  }
  .badge.cpa{background:var(--milk-light);color:var(--navy-deep);}
  .badge.ins{background:#DCEEE3;color:var(--good);}

  /* ---------- Floating WhatsApp ---------- */
  .fab-wa{
    position:fixed;right:18px;bottom:18px;
    display:flex;align-items:center;justify-content:center;
    width:56px;height:56px;
    background:#25D366;color:#fff;
    border-radius:50%;
    text-decoration:none;
    box-shadow:0 6px 18px rgba(37,211,102,.35);
    z-index:20;
  }
  .fab-wa svg{flex:none;}

  /* ---------- Hero ---------- */
  .hero{
    padding:36px 20px 8px;
    max-width:640px;margin:0 auto;
    text-align:center;
  }
  .pill{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--milk-light);
    color:var(--navy);
    font-size:13px;font-weight:700;
    padding:7px 16px;border-radius:999px;
    margin-bottom:22px;
    letter-spacing:.02em;
  }
  h1{
    font-size:30px;
    line-height:1.42;
    color:var(--navy-deep);
    font-weight:900;
    margin-bottom:16px;
  }
  h1 .hl{
    position:relative;
    color:var(--navy);
  }
  h1 .hl::after{
    content:"";
    position:absolute;
    left:-2%;right:-2%;bottom:2px;
    height:10px;
    background:var(--milk);
    opacity:.55;
    z-index:-1;
    border-radius:2px 8px 3px 6px/6px 3px 8px 2px;
  }
  .sub{
    font-size:15.5px;
    color:var(--ink-soft);
    max-width:480px;
    margin:0 auto 6px;
  }

  /* ---------- Trust row ---------- */
  .trust-row{
    display:flex;justify-content:center;gap:18px;
    flex-wrap:wrap;
    margin:22px auto 0;
    font-size:12.5px;color:var(--ink-soft);
    max-width:520px;
  }
  .trust-row span{display:flex;align-items:center;gap:5px;}
  .trust-row svg{flex:none;}

  /* ---------- Form card ---------- */
  .card{
    max-width:520px;
    margin:28px auto 0;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:18px;
    padding:28px 22px 26px;
    box-shadow:0 1px 3px rgba(0,56,101,.05), 0 12px 30px -18px rgba(0,56,101,.18);
  }
  .field{margin-bottom:18px;}
  label{
    display:block;font-size:13.5px;font-weight:700;
    color:var(--navy-deep);margin-bottom:7px;
  }
  label .req{color:#B5502F;margin-left:2px;}
  label .opt{font-weight:400;color:var(--ink-soft);}
  input[type=text], input[type=tel], input[type=email]{
    width:100%;
    padding:13px 14px;
    font-size:15.5px;
    font-family:inherit;
    color:var(--ink);
    background:var(--cream);
    border:1.5px solid var(--line);
    border-radius:10px;
    outline:none;
    transition:border-color .15s, background .15s;
  }
  input::placeholder{color:#A9A092;}
  input:focus{
    border-color:var(--navy);
    background:var(--paper);
  }
  input.err{border-color:#B5502F;background:#FBF0EC;}
  .errmsg{
    font-size:12.5px;color:#B5502F;margin-top:5px;display:none;
  }
  .field.invalid .errmsg{display:block;}

  .consent{
    display:flex;gap:10px;align-items:flex-start;
    margin:6px 0 20px;
    font-size:13px;color:var(--ink-soft);
  }
  .consent input{
    width:19px;height:19px;flex:none;margin-top:2px;
    accent-color:var(--navy);
  }
  .consent b{color:var(--ink);}

  button.submit{
    width:100%;
    padding:16px;
    font-size:16.5px;
    font-weight:700;
    font-family:inherit;
    color:var(--navy-deep);
    background:var(--milk);
    border:none;border-radius:12px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:background .15s, transform .1s;
  }
  button.submit:hover{background:#B6935F;}
  button.submit:active{transform:scale(.99);}
  button.submit:disabled{opacity:.6;cursor:default;}

  .fineprint{
    text-align:center;font-size:12px;color:#9AA6AE;
    margin-top:14px;
  }

  /* ---------- Success state ---------- */
  .success{
    display:none;
    text-align:center;
    padding:6px 4px 4px;
  }
  .success.show{display:block;}
  .card.success-mode .form-mode{display:none;}
  .success-icon{
    width:56px;height:56px;
    margin:0 auto 16px;
    border-radius:50%;
    background:var(--milk-light);
    display:flex;align-items:center;justify-content:center;
  }
  .success h2{
    font-family:'Noto Serif TC',serif;
    font-size:20px;color:var(--navy-deep);margin-bottom:10px;
  }
  .success p{font-size:14.5px;color:var(--ink-soft);margin-bottom:20px;}
  a.calc-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--milk);color:var(--navy-deep);
    padding:14px 26px;border-radius:12px;
    font-weight:700;font-size:15.5px;
    text-decoration:none;
  }
  a.calc-btn:hover{background:#B6935F;}

  /* ---------- Footer ---------- */
  footer{
    max-width:520px;margin:26px auto 40px;
    padding:0 20px 70px;
    text-align:center;
    font-size:12px;line-height:1.8;
    color:#9AA6AE;
  }

  @media (max-width:380px){
    h1{font-size:26px;}
  }
</style>
</head>
<body>

  <div class="profile-hero">
    <div class="avatar">
      <img src="assets/avatar.jpg" alt="Lily Lau">
    </div>
    <div class="profile-name">Lily Lau</div>
    <div class="profile-handle">@pru_lilylau</div>
    <div class="badge-row">
      <span class="badge cpa">持牌會計師 CPA</span>
      <span class="badge ins">持牌保險顧問</span>
    </div>
  </div>

  <div class="hero">
    <div class="pill">完全免費 · 無銷售壓力</div>
    <h1 class="display"><span class="hl">免費計算</span>保障缺口</h1>
    <p class="sub">留低你嘅WhatsApp，我會send返個「保障缺口計算機」俾你。</p>
  </div>

  <div class="trust-row">
    <span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#5A6B78" stroke-width="1.6"/><path d="M12 7v5l3 3" stroke="#5A6B78" stroke-width="1.6" stroke-linecap="round"/></svg>
      1分鐘計完
    </span>
    <span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 12l4-4M3 12l4 4M3 12h18" stroke="#5A6B78" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      資料絕不轉售
    </span>
  </div>

  <div class="card" id="card">
    <div class="form-mode">
      <form id="leadForm" novalidate>
        <div class="field" id="f-name">
          <label>你的名字 <span class="req">*</span></label>
          <input type="text" id="name" placeholder="例：Chris Wong">
          <div class="errmsg">請input返你嘅名字</div>
        </div>

        <div class="field" id="f-phone">
          <label>WhatsApp 電話 <span class="req">*</span></label>
          <input type="tel" id="phone" placeholder="例：61235 678" inputmode="numeric">
          <div class="errmsg">麻煩留返8位WhatsApp電話</div>
        </div>

        <div class="field" id="f-email">
          <label>電郵地址 <span class="opt">(選填)</span></label>
          <input type="email" id="email" placeholder="例：hello@gmail.com">
        </div>

        <label style="display:flex;align-items:flex-start;gap:10px;font-weight:400;font-size:13px;color:var(--ink-soft);margin-bottom:20px;">
          <input type="checkbox" id="consent" style="width:19px;height:19px;flex:none;margin-top:2px;accent-color:var(--navy);">
          <span>我明白Lily會透過<b>WhatsApp</b>聯絡我提供保障缺口分析，並同意提供真實聯絡資料。</span>
        </label>
        <div class="errmsg" id="consentErr" style="display:none;margin-top:-12px;margin-bottom:16px;">請剔選同意先可以繼續</div>

        <button type="submit" class="submit" id="submitBtn">
          免費開始計算保障缺口
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#00223d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <p class="fineprint">你的資料只會用於聯絡用途，絕不會轉售給第三方</p>
      </form>
    </div>

    <div class="success" id="successBlock">
      <div class="success-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#003865" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2>搞掂喇！</h2>
      <p>撳下面個掣，即刻計下你嘅保障缺口：</p>
      <a class="calc-btn" href="https://pru-lilylau.github.io/landing-page/calculator.html" target="_blank" rel="noopener">
        前往保障缺口計算機
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#00223d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div>
  </div>

  <footer>
    此計算工具及分析僅供參考，並非保單建議或保證回報。<br>
    實際保障方案需按個人情況及保單條款而定。
  </footer>

  <a class="fab-wa" id="fabWa" href="#" target="_blank" rel="noopener">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.36 5.07L2 22l5.06-1.33A9.94 9.94 0 0 0 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm5.2 14.15c-.22.62-1.28 1.18-1.77 1.22-.45.04-.9.06-1.45-.09-.33-.09-.76-.24-1.31-.47-2.3-.99-3.8-3.3-3.92-3.45-.11-.15-.94-1.25-.94-2.38s.59-1.68.8-1.91c.21-.23.46-.29.62-.29.15 0 .31 0 .44.01.14.01.33-.05.52.4.2.47.67 1.62.73 1.74.06.12.1.26.02.42-.08.15-.12.25-.24.38-.12.14-.25.31-.36.42-.12.12-.24.24-.11.48.14.24.6 1 1.29 1.62.89.79 1.63 1.04 1.88 1.16.24.12.38.1.52-.06.15-.16.62-.72.79-.97.16-.24.33-.2.55-.12.23.08 1.45.68 1.7.81.24.12.41.18.47.28.06.11.06.6-.16 1.22z"/></svg>
  </a>

<script>
  // WhatsApp 直連：唔經任何後台，submit 後直接開返你個 WhatsApp
  const WHATSAPP_NUMBER = "85260133108"; // 852 + 8位電話，唔可以有空格/符號
  const CALC_URL = "https://pru-lilylau.github.io/landing-page/calculator.html";
  const FORMSPREE_ENDPOINT = "https://formspree.io/f/xwvdzwjv";

  document.getElementById('fabWa').href =
    `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent('你好Lily！想了解多啲保障方案 🙋')}`;

  const form = document.getElementById('leadForm');
  const card = document.getElementById('card');
  const submitBtn = document.getElementById('submitBtn');
  const consentErr = document.getElementById('consentErr');

  function showFieldError(id, on){
    document.getElementById(id).classList.toggle('invalid', on);
    document.getElementById(id).querySelector('input')?.classList.toggle('err', on);
  }

  function validatePhone(v){
    const digits = v.replace(/\D/g,'');
    return digits.length >= 8;
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const consent = document.getElementById('consent').checked;

    let valid = true;
    showFieldError('f-name', !name); if(!name) valid = false;
    showFieldError('f-phone', !validatePhone(phone)); if(!validatePhone(phone)) valid = false;
    consentErr.style.display = consent ? 'none' : 'block'; if(!consent) valid = false;

    if(!valid) return;

    submitBtn.disabled = true;
    submitBtn.textContent = '提交緊…';

    // 靜默提交去 Formspree，留低用戶資料
    fetch(FORMSPREE_ENDPOINT, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Accept':'application/json'},
      body: JSON.stringify({
        name, phone, email,
        source: 'insurance-gap-calculator-landing',
        submittedAt: new Date().toISOString()
      })
    }).catch(err => console.error('Formspree提交失敗', err));

    // 提交後顯示成功畫面，用戶自己撳掣先去計算機

    card.classList.add('success-mode');
    document.getElementById('successBlock').classList.add('show');
  });
</script>
</body>
</html>
