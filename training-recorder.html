<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>錄音筆記</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="錄音筆記">
<meta name="theme-color" content="#2F5C52">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F5F3EE;
    --card: #FFFFFF;
    --ink: #211F1B;
    --ink-soft: #746E63;
    --line: #E3DED2;
    --teal: #2F5C52;
    --teal-deep: #1C3833;
    --coral: #C4472F;
    --coral-soft: #F5DCD3;
    --amber: #C08A3E;
    --tag-bg: #EFEAE0;
    --radius-lg: 18px;
    --radius-md: 12px;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .app{
    max-width: 520px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
    padding-bottom: 90px;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 20px 18px 12px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
  }
  .pin-icon{
    width:34px; height:34px; border-radius: 50%;
    background: var(--teal-deep);
    display:flex; align-items:center; justify-content:center;
  }
  .pin-icon .dot{ width:9px; height:9px; border-radius:50%; background: var(--coral); }
  .brand h1{
    font-family: 'Noto Serif TC', serif;
    font-size: 18px; font-weight: 700; margin:0;
  }
  .backBtn{
    border:none; background: transparent; color: var(--teal-deep);
    font-size: 14px; font-weight:600; cursor:pointer; padding: 6px 4px;
  }

  .view{ display:none; padding: 0 18px; }
  .view.active{ display:block; }

  /* ---------- Library ---------- */
  .search-wrap{ margin-bottom: 14px; }
  .search-wrap input{
    width:100%; padding: 10px 14px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--card);
    font-family:'Noto Sans TC', sans-serif; font-size: 13.5px; color: var(--ink);
  }
  .filter-chips{ display:flex; gap:6px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-chip{
    border:1px solid var(--line); background: var(--card); color: var(--ink-soft);
    padding: 5px 12px; border-radius: 999px; font-size:12px; font-weight:600; cursor:pointer;
  }
  .filter-chip.active{ background: var(--teal); color:#fff; border-color: var(--teal); }

  .rec-card{
    background: var(--card); border:1px solid var(--line); border-radius: var(--radius-md);
    padding: 14px 15px; margin-bottom: 10px; cursor:pointer; display:flex; gap:12px;
    transition: border-color .15s ease;
  }
  .rec-card:hover{ border-color: var(--teal); }
  .rec-badge{
    flex-shrink:0; width:40px; height:40px; border-radius:50%;
    background: var(--tag-bg); display:flex; align-items:center; justify-content:center;
    font-size: 15px;
  }
  .rec-card-body{ flex:1; min-width:0; }
  .rec-title{ font-weight:700; font-size:14.5px; margin:0 0 3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rec-meta{ font-size:11px; color: var(--ink-soft); margin-bottom:5px; }
  .rec-preview{ font-size:12.5px; color: var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rec-tags{ display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }
  .tag-pill{ background: var(--tag-bg); color: var(--teal-deep); font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:999px; }

  .empty-state{ text-align:center; color: var(--ink-soft); font-size:13.5px; padding: 60px 20px; }
  .empty-state .big{ font-size: 34px; margin-bottom: 10px; }

  .fab{
    position: fixed; bottom: calc(26px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    width: 62px; height:62px; border-radius:50%; border:none;
    background: var(--coral); box-shadow: 0 6px 18px rgba(196,71,47,0.35);
    cursor:pointer; z-index: 30;
    display:flex; align-items:center; justify-content:center;
  }
  .fab::after{ content:""; width:20px; height:20px; border-radius:50%; background:#fff; }
  .fab-wrap{ max-width:520px; margin:0 auto; position:relative; }

  /* ---------- Record view ---------- */
  .deck{
    background: var(--card); border:1px solid var(--line); border-radius: var(--radius-lg);
    padding: 26px 20px 20px; text-align:center; margin-top: 6px;
  }
  .timer{
    font-family:'IBM Plex Mono', monospace; font-size: 38px; font-weight:600;
    color: var(--teal-deep); margin: 4px 0 14px;
  }
  .wave-wrap{ background: var(--teal-deep); border-radius: 10px; padding: 10px; margin-bottom: 18px; }
  canvas#wave{ width:100%; height:56px; display:block; }
  .rec-btn{
    width: 74px; height: 74px; border-radius: 50%; border:none;
    background: var(--coral); box-shadow: 0 0 0 6px rgba(196,71,47,0.12);
    cursor:pointer; margin: 0 auto; position:relative;
  }
  .rec-btn.recording::after{ content:""; display:block; width:22px; height:22px; border-radius:5px; background:#fff; margin:26px auto; }
  .rec-btn.idle::after{ content:""; display:block; width:22px; height:22px; border-radius:50%; background:#fff; margin:26px auto; }
  .rec-btn.paused{ background: var(--amber); box-shadow: 0 0 0 6px rgba(192,138,62,0.14); }
  .rec-btn.paused::after{ content:""; display:block; width:0; height:0; margin:24px auto; border-top:12px solid transparent; border-bottom:12px solid transparent; border-left:20px solid #fff; }
  .controls-row{ display:flex; align-items:center; justify-content:center; gap:18px; }
  .finish-btn{
    border:none; border-radius:999px; padding:10px 18px; background: var(--teal); color:#fff;
    font-family:'Noto Sans TC', sans-serif; font-size:13px; font-weight:700; cursor:pointer;
  }
  .finish-btn.pause-variant{ background: var(--amber); }
  .rec-status{ font-size:12.5px; color: var(--ink-soft); margin-top:10px; }
  select.lang{
    margin-top: 14px; padding: 6px 10px; border-radius:8px; border:1px solid var(--line);
    background: var(--card); font-size:12.5px; color: var(--ink);
  }
  .live-transcript{
    margin-top: 10px; text-align:left; font-size:13px; line-height:1.7; color: var(--ink);
    max-height: 160px; min-height: 90px; overflow-y:auto; background: var(--card); border:1px solid var(--line);
    border-radius: 10px; padding: 12px; width:100%; font-family:'Noto Sans TC', sans-serif; resize: vertical;
  }
  .speaker-bar{
    display:flex; gap:6px; flex-wrap:wrap; align-items:center; justify-content:flex-start;
    margin-top: 18px; text-align:left;
  }
  .speaker-chip{
    border: 1.5px solid var(--line); background: var(--card); border-radius:999px;
    padding: 6px 12px; font-size:12px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px;
  }
  .speaker-chip .dot{ width:8px; height:8px; border-radius:50%; }
  .speaker-chip.active{ border-color: currentColor; background: var(--tag-bg); }
  .speaker-add{
    border: 1.5px dashed var(--line); background:transparent; color: var(--ink-soft);
    border-radius:999px; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer;
  }
  .speaker-tag{ font-weight:700; }

  .template-section{ margin-top: 20px; }
  .section-label{ font-size:12px; font-weight:700; color: var(--teal-deep); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .template-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom: 16px; }
  .template-card{
    border:1.5px solid var(--line); background: var(--card); border-radius: 10px; padding: 10px 12px;
    cursor:pointer; text-align:left;
  }
  .template-card.selected{ border-color: var(--teal); background: #EAF1EE; }
  .template-card .t-name{ font-weight:700; font-size:13px; margin-bottom:2px; }
  .template-card .t-desc{ font-size:11px; color: var(--ink-soft); }

  button.btn{ border:none; border-radius:9px; padding: 10px 16px; font-family:'Noto Sans TC', sans-serif; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-primary{ background: var(--teal); color:#fff; width:100%; }
  .btn-primary:disabled{ background:#B7C4BF; cursor:not-allowed; }
  .btn-ghost{ background:transparent; color: var(--ink-soft); border:1px solid var(--line); width:100%; margin-top:8px; }
  .loading{ text-align:center; font-size:12.5px; color: var(--ink-soft); margin-top:10px; }

  /* ---------- Detail view ---------- */
  .detail-title{
    font-family:'Noto Serif TC', serif; font-size: 19px; font-weight:700; border:none; background:transparent;
    width:100%; padding: 0; margin-top:14px; color: var(--ink);
  }
  .detail-meta{ font-size:11.5px; color: var(--ink-soft); margin: 4px 0 12px; }
  .tag-editor{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom: 16px; }
  .tag-editor input{ border:1px dashed var(--line); background:transparent; font-size:11.5px; padding:3px 8px; border-radius:999px; width:90px; }
  .tag-pill.removable{ cursor:pointer; }
  .tag-pill.removable::after{ content:" ×"; }

  .subtabs{ display:flex; gap:6px; background: var(--tag-bg); border-radius:999px; padding:4px; margin-bottom:14px; }
  .subtabs button{ flex:1; border:none; background:transparent; padding:7px 0; border-radius:999px; font-size:12.5px; font-weight:700; color: var(--ink-soft); cursor:pointer; }
  .subtabs button.active{ background: var(--card); color: var(--teal-deep); }
  .subview{ display:none; }
  .subview.active{ display:block; }

  .summary-block{ background: var(--card); border:1px solid var(--line); border-radius: var(--radius-md); padding: 14px 16px; font-size:13.5px; line-height:1.75; white-space:pre-wrap; margin-bottom:14px; }
  .transcript-block{ background: var(--card); border:1px solid var(--line); border-radius: var(--radius-md); padding: 14px 16px; font-size:13px; line-height:1.75; white-space:pre-wrap; }

  .qa-thread{ margin-bottom: 12px; }
  .qa-item{ margin-bottom: 12px; }
  .qa-q{ font-weight:700; font-size:13px; margin-bottom:4px; }
  .qa-a{ font-size:13px; line-height:1.65; background: var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 12px; white-space:pre-wrap; }
  .qa-input-row{ display:flex; gap:8px; position: sticky; bottom: 10px; }
  .qa-input-row input{ flex:1; padding:10px 12px; border-radius:999px; border:1px solid var(--line); font-size:13px; }
  .qa-input-row button{ border-radius:999px; padding: 0 16px; background: var(--teal); color:#fff; border:none; font-weight:700; font-size:13px; }

  .action-row{ display:flex; gap:8px; margin-top: 18px; }
  .action-row button{ flex:1; }
  .btn-danger{ background: transparent; color: var(--coral); border: 1px solid var(--coral); }

  .banner{ background:#F5DCD3; border:1px solid var(--line); color: var(--teal-deep); font-size:12px; padding:9px 12px; border-radius:8px; margin-bottom:14px; }

  .info-toolbar{ display:flex; gap:8px; margin-bottom: 14px; }
  .info-toolbar button{ flex:1; }
  .info-card-wrap{
    background: var(--card); border:1px solid var(--line); border-radius: var(--radius-md);
    padding: 10px; display:flex; justify-content:center;
  }
  .info-card-wrap svg{ width:100%; height:auto; max-width: 400px; display:block; }
  .info-empty{ text-align:center; color: var(--ink-soft); font-size:13px; padding: 40px 16px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar" id="topbar">
    <div class="brand">
      <div class="pin-icon"><div class="dot"></div></div>
      <h1>錄音筆記</h1>
    </div>
    <button class="backBtn" id="backBtn" style="display:none;">‹ 返回</button>
  </div>

  <!-- LIBRARY -->
  <section class="view active" id="viewLibrary">
    <div class="search-wrap"><input id="searchInput" placeholder="搜尋標題或內容…"></div>
    <div class="filter-chips" id="filterChips"></div>
    <div id="libraryList"></div>
  </section>

  <!-- RECORD -->
  <section class="view" id="viewRecord">
    <div id="unsupportedBanner" class="banner" style="display:none;">呢個瀏覽器唔支援即時語音轉文字（建議用 Chrome）。你仍然可以錄音，之後自己補文字。</div>
    <div class="deck">
      <div class="timer" id="timer">00:00</div>
      <div class="wave-wrap"><canvas id="wave"></canvas></div>
      <button id="recBtn" class="rec-btn idle" title="開始錄音"></button>
      <div class="rec-status" id="recStatus">撳一下開始錄音</div>
      <div class="controls-row" style="margin-top:12px;">
        <button id="pauseBtn" class="finish-btn pause-variant" style="display:none;">⏸ 暫停</button>
        <button id="finishBtn" class="finish-btn" style="display:none;">✓ 完成錄音</button>
      </div>
      <select id="langSelect" class="lang">
        <option value="yue-Hant-HK">廣東話（香港）</option>
        <option value="zh-CN">普通話（大陸）</option>
        <option value="en-US">English</option>
      </select>
      <div class="speaker-bar" id="speakerBar" style="display:none;"></div>
      <textarea class="live-transcript" id="liveTranscript" placeholder="打字，或者用 iOS 鍵盤嘅聽寫掣，將逐字稿打喺呢度…"></textarea>
    </div>

    <div class="template-section" id="templateSection" style="display:none;">
      <div class="section-label">揀個摘要範本</div>
      <div class="template-grid" id="templateGrid"></div>
      <button class="btn btn-primary" id="generateBtn">生成摘要並儲存</button>
      <button class="btn btn-ghost" id="saveRawBtn">唔使摘要，直接儲存</button>
      <div class="loading" id="loadingMsg" style="display:none;">摘要生成緊，請等等……</div>
    </div>
  </section>

  <!-- DETAIL -->
  <section class="view" id="viewDetail">
    <input class="detail-title" id="detailTitle">
    <div class="detail-meta" id="detailMeta"></div>
    <div class="tag-editor" id="tagEditor"></div>

    <div class="subtabs">
      <button class="active" id="subtabSummary">摘要</button>
      <button id="subtabTranscript">逐字稿</button>
      <button id="subtabAsk">問呢段記錄</button>
      <button id="subtabInfographic">資訊圖</button>
    </div>

    <div class="subview active" id="subviewSummary">
      <div class="summary-block" id="summaryBlock"></div>
    </div>
    <div class="subview" id="subviewTranscript">
      <div class="transcript-block" id="transcriptBlock"></div>
    </div>
    <div class="subview" id="subviewAsk">
      <div class="qa-thread" id="qaThread"></div>
      <div class="qa-input-row">
        <input id="qaInput" placeholder="例如：講者提到咩截止日期？">
        <button id="qaSendBtn">問</button>
      </div>
    </div>
    <div class="subview" id="subviewInfographic">
      <div class="info-toolbar">
        <button class="btn btn-primary" id="genInfographicBtn">生成可愛資訊圖</button>
        <button class="btn btn-ghost" id="downloadInfographicBtn" style="display:none;">下載 PNG</button>
      </div>
      <div class="loading" id="infographicLoading" style="display:none;">畫緊圖，請等等……</div>
      <div class="info-card-wrap" id="infographicWrap"><div class="info-empty">撳「生成可愛資訊圖」，將摘要變做一張可愛小卡片，啱晒放IG Story或者傳畀學員／客戶。</div></div>
    </div>

    <div class="action-row">
      <button class="btn btn-ghost" id="copyBtn">複製摘要</button>
      <button class="btn btn-danger" id="deleteBtn">刪除</button>
    </div>
  </section>
</div>

<script>
(function(){
  // ================= Templates =================
  const TEMPLATES = [
    { id:'training', name:'培訓課堂筆記', desc:'重點・學到嘢・行動項目', icon:'📘',
      prompt: '請將以下培訓課堂逐字稿整理成：\n【摘要】用2-3句講呢堂課講咩\n【重點內容】3-6點列出核心知識點\n【學到嘢／啟發】對用戶個人有咩用得著嘅睇法\n【行動項目】有咩要跟進實踐，冇就寫「無特別行動項目」\n【關鍵詞】5-8個，用頓號分開' },
    { id:'meeting', name:'客戶會議記錄', desc:'需求・顧慮・跟進', icon:'🤝',
      prompt: '請將以下客戶會議逐字稿整理成：\n【摘要】2-3句概括呢次會議\n【客戶需求／顧慮】列出客戶提到嘅需要同擔心嘅位\n【已達成共識】\n【跟進事項】列出跟進動作，包括負責人／期限（如有提到）\n【關鍵詞】5-8個，用頓號分開' },
    { id:'idea', name:'隨手靈感', desc:'摘要・重點・標籤', icon:'💡',
      prompt: '請將以下隨手錄音整理成：\n【摘要】1-2句概括\n【重點】3-5點\n【建議標籤】3-5個適合用嚟分類呢段記錄嘅標籤，用頓號分開' },
    { id:'general', name:'通用摘要', desc:'摘要・重點・行動項目', icon:'📝',
      prompt: '請將以下逐字稿整理成：\n【摘要】2-3句概括\n【重點】3-6點\n【行動項目】有跟進事項就列出，冇就寫「無特別行動項目」\n【關鍵詞】5-8個，用頓號分開' }
  ];

  // ================= State =================
  let currentView = 'library';
  let mediaRecorder=null, audioChunks=[], audioStream=null;
  let recognition=null, recognizing=false;
  let finalTranscript='', timerInterval=null, startTime=null, totalPausedMs=0, pauseStart=null;
  let audioCtx=null, analyser=null, waveAnimId=null;
  let selectedTemplate = TEMPLATES[0];
  let activeFilterTag = null;
  let currentDetailId = null;

  const SpeechRecognitionClass = window.SpeechRecognition || window.webkitSpeechRecognition;
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if(!SpeechRecognitionClass){
    document.getElementById('unsupportedBanner').style.display='block';
  } else if(isIOS){
    const b = document.getElementById('unsupportedBanner');
    b.style.display = 'block';
    b.innerHTML = '📱 iPhone／iPad 嘅瀏覽器（Safari、Chrome 都係）暫時未做齊「即時語音轉文字」呢個網頁技術，呢個係蘋果 WebKit 嘅系統限制，唔關權限事，轉瀏覽器都冇用。<br><br>錄音本身冇問題。錄完之後，撳入逐字稿格，用返 iOS 鍵盤自帶嗰粒咪高峰「聽寫」掣讀多次，就可以用蘋果自己嘅聽寫引擎打字。';
  }

  // ================= View switching =================
  const views = { library: document.getElementById('viewLibrary'), record: document.getElementById('viewRecord'), detail: document.getElementById('viewDetail') };
  const backBtn = document.getElementById('backBtn');

  function showView(name){
    Object.keys(views).forEach(k => views[k].classList.toggle('active', k===name));
    currentView = name;
    backBtn.style.display = name === 'library' ? 'none' : 'inline-block';
  }
  backBtn.addEventListener('click', () => {
    if(currentView === 'record' && (recBtn.classList.contains('recording') || recBtn.classList.contains('paused'))){
      if(!confirm('仲錄緊音，確定要離開？未儲存嘅內容會不見。')) return;
      stopRecording();
    }
    showView('library');
    renderLibrary();
  });

  // ================= FAB =================
  const fabWrap = document.createElement('div');
  fabWrap.className = 'fab-wrap';
  const fab = document.createElement('button');
  fab.className = 'fab';
  fab.id = 'fabRecord';
  document.body.appendChild(fabWrap);
  fabWrap.appendChild(fab);
  fab.addEventListener('click', () => {
    resetRecordView();
    showView('record');
  });
  function toggleFab(){ fab.style.display = currentView === 'library' ? 'flex' : 'none'; }
  const origShowView = showView;
  showView = function(name){ origShowView(name); toggleFab(); };
  toggleFab();

  // ================= Recording =================
  const recBtn = document.getElementById('recBtn');
  const finishBtn = document.getElementById('finishBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const recStatus = document.getElementById('recStatus');
  const timerEl = document.getElementById('timer');
  const langSelect = document.getElementById('langSelect');
  const liveTranscript = document.getElementById('liveTranscript');
  liveTranscript.addEventListener('input', () => { finalTranscript = liveTranscript.value; });
  const templateSection = document.getElementById('templateSection');
  const templateGrid = document.getElementById('templateGrid');
  const generateBtn = document.getElementById('generateBtn');
  const saveRawBtn = document.getElementById('saveRawBtn');
  const loadingMsg = document.getElementById('loadingMsg');
  const canvas = document.getElementById('wave');
  const ctx = canvas.getContext('2d');

  function colorForSpeaker(name){

    for(let i=0;i<name.length;i++) hash = (hash*31 + name.charCodeAt(i)) % SPEAKER_PALETTE.length;

  }

  function resizeCanvas(){ canvas.width = canvas.clientWidth*devicePixelRatio; canvas.height = canvas.clientHeight*devicePixelRatio; }

  function drawWave(){
    if(!analyser) return;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    analyser.getByteTimeDomainData(dataArray);
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.lineWidth = 2*devicePixelRatio; ctx.strokeStyle = '#C08A3E'; ctx.beginPath();
    const sliceWidth = canvas.width/bufferLength; let x=0;
    for(let i=0;i<bufferLength;i++){ const v=dataArray[i]/128.0; const y=v*canvas.height/2; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); x+=sliceWidth; }
    ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();
    waveAnimId = requestAnimationFrame(drawWave);
  }

  function fmtTime(ms){ const s=Math.floor(ms/1000); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

  async function startRecording(){

    audioChunks=[];
    mediaRecorder = new MediaRecorder(audioStream);
    mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.start();

    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(audioStream);
    analyser = audioCtx.createAnalyser(); analyser.fftSize=2048;
    source.connect(analyser); drawWave();

    activeSpeakerIdx = 0;
    renderSpeakerBar();
    finalTranscript = '【' + speakers[activeSpeakerIdx] + '】';
    liveTranscript.value = finalTranscript;
    if(SpeechRecognitionClass && !isIOS) startRecognition();

    startTime = Date.now();
    timerInterval = setInterval(() => { timerEl.textContent = fmtTime(Date.now()-startTime-totalPausedMs); }, 250);

  function pauseRecording(){
    if(mediaRecorder && mediaRecorder.state==='recording'){
      try{ mediaRecorder.pause(); }catch(e){ console.warn('pause not supported', e); }
    }
    recognizing = false;
    if(recognition){ try{ recognition.stop(); }catch(e){} }
    cancelAnimationFrame(waveAnimId);
    clearInterval(timerInterval);
    pauseStart = Date.now();
    recBtn.classList.remove('recording'); recBtn.classList.add('paused');
    recStatus.textContent = '已暫停。撳「▶ 繼續錄」可以繼續錄，或者撳「完成錄音」去揀範本同儲存。';
    pauseBtn.textContent = '▶ 繼續錄';
    pauseBtn.classList.add('pause-variant');
  }

  function resumeRecording(){
    if(mediaRecorder && mediaRecorder.state==='paused'){
      try{ mediaRecorder.resume(); }catch(e){ console.warn('resume not supported', e); }
    }
    if(pauseStart) totalPausedMs += Date.now() - pauseStart;
    pauseStart = null;
    if(SpeechRecognitionClass && !isIOS) startRecognition();

  }

  function startRecognition(){
    const candidates = Array.from(new Set([langSelect.value, 'zh-HK', 'yue-Hant-HK', 'zh-CN', 'en-US']));
    let candidateIdx = 0;

    function tryStart(){
      recognition = new SpeechRecognitionClass();
      recognition.lang = candidates[candidateIdx];
      recognition.continuous = true;
      recognition.interimResults = true;
      recognizing = true;

      recognition.onresult = (event) => {
        let interim='';
        for(let i=event.resultIndex;i<event.results.length;i++){
          const res = event.results[i];
          if(res.isFinal) finalTranscript += res[0].transcript; else interim += res[0].transcript;
        }
        liveTranscript.value = finalTranscript + (interim?('〔'+interim+'〕'):'');
        liveTranscript.scrollTop = liveTranscript.scrollHeight;
        recStatus.textContent = '錄緊音…撳講者名可以標返邊個講緊嘢';
      };

      recognition.onerror = (e) => {
        console.warn('speech recognition error', e.error);
        if(!recognizing) return;
        if(e.error === 'language-not-supported' && candidateIdx < candidates.length - 1){
          candidateIdx++;
          recStatus.textContent = '呢個瀏覽器唔支援「' + candidates[candidateIdx-1] + '」，轉緊用「' + candidates[candidateIdx] + '」試下…';
          try{ recognition.stop(); }catch(err){}
          return; // onend will fire and restart with the new candidate
        }
        if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
          recStatus.textContent = '⚠️ 冇攞到咪嘅權限。請去瀏覽器設定俾返麥克風權限畀呢個網站，再重新錄音。';
        } else if(e.error === 'audio-capture'){
          recStatus.textContent = '⚠️ 搵唔到麥克風，請檢查裝置。';
        } else if(e.error === 'language-not-supported'){
          recStatus.textContent = '⚠️ 呢個瀏覽器唔支援即時轉文字嘅語言。錄音會繼續，但要自己手動打逐字稿。建議用 Chrome 試下。';
        }
        // 'no-speech' and 'network' are common/expected — keep listening via onend restart
      };

      recognition.onend = () => {
        if(recognizing){ try{ tryStart(); }catch(err){} }
      };

      try{ recognition.start(); }
      catch(e){ console.warn('recognition start failed', e); }
    }

    tryStart();
  }

  function stopRecording(){
    if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
    if(audioStream) audioStream.getTracks().forEach(t=>t.stop());
    if(recognition){ recognizing=false; recognition.stop(); }
    if(audioCtx){ cancelAnimationFrame(waveAnimId); audioCtx.close(); audioCtx=null; analyser=null; ctx.clearRect(0,0,canvas.width,canvas.height); }

    return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();

    general: {
      bg1:'#F3EEFB', bg2:'#FCEFE6',
      headerStripes:['#E9DDF9','#FAE2D3','#DBEFEA','#F6DCE8','#DCE9F8','#E9DDF9'],
      cloudA:'#EBDEF9', cloudB:'#FBE1CD', accent:'#7A5CA8', ink:'#3D3730',
      tagPalette:['#7A5CA8','#E39A6B','#5FA6A0','#E08FAE']
    }
  };
  const STAR_GLYPHS = ['✦','★','✧','⋆'];
  const STICKER_SPOTS = [
    {x:50,y:60,size:22},{x:740,y:50,size:18},{x:680,y:140,size:16},{x:60,y:170,size:16},
    {x:730,y:230,size:20},{x:40,y:260,size:18}
  ];

  function drawMascot(cx, cy, r, color){
    // Simple round kawaii blob face built entirely from primitive shapes (no illustration model available)
    return '<g>' +
      '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + color + '" />' +
      '<circle cx="' + (cx-r*0.32) + '" cy="' + (cy-r*0.05) + '" r="' + (r*0.09) + '" fill="#3A362F" />' +
      '<circle cx="' + (cx+r*0.32) + '" cy="' + (cy-r*0.05) + '" r="' + (r*0.09) + '" fill="#3A362F" />' +
      '<circle cx="' + (cx-r*0.42) + '" cy="' + (cy+r*0.22) + '" r="' + (r*0.16) + '" fill="#fff" opacity="0.35" />' +
      '<circle cx="' + (cx+r*0.42) + '" cy="' + (cy+r*0.22) + '" r="' + (r*0.16) + '" fill="#fff" opacity="0.35" />' +
      '<path d="M ' + (cx-r*0.22) + ' ' + (cy+r*0.18) + ' Q ' + cx + ' ' + (cy+r*0.42) + ' ' + (cx+r*0.22) + ' ' + (cy+r*0.18) + '" stroke="#3A362F" stroke-width="' + (r*0.06) + '" fill="none" stroke-linecap="round" />' +
    '</g>';
  }

  function cloudPanel(x, y, w, h, color, bumpCount){
    bumpCount = bumpCount || 6;
    const bumpR = h * 0.16;
    let bumps = '';
    for(let i=0;i<bumpCount;i++){
      const cx = x + (w/(bumpCount-1))*i;
      bumps += '<circle cx="' + cx + '" cy="' + y + '" r="' + bumpR + '" fill="' + color + '" />';
    }
    let bumpsBottom = '';
    for(let i=0;i<Math.round(bumpCount*0.7);i++){
      const cx = x + w*0.15 + (w*0.7/(Math.max(1,Math.round(bumpCount*0.7)-1)))*i;
      bumpsBottom += '<circle cx="' + cx + '" cy="' + (y+h) + '" r="' + (bumpR*0.8) + '" fill="' + color + '" />';
    }
    return '<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h + '" rx="30" fill="' + color + '" />' + bumps + bumpsBottom;
  }

  function speechBubble(x, y, w, h, fill){
    const cx = x + w/2;
    return '<path d="M ' + (x+28) + ' ' + y + ' h ' + (w-56) + ' a28 28 0 0 1 28 28 v ' + (h-56) + ' a28 28 0 0 1 -28 28 h ' + (w-56) + ' a28 28 0 0 1 -28 -28 v ' + (h-56) + ' a28 28 0 0 1 28 -28 z" fill="' + fill + '" transform="translate(0,0)" />' +
      '<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h + '" rx="28" fill="' + fill + '" />' +
      '<path d="M ' + (cx-16) + ' ' + y + ' L ' + cx + ' ' + (y-20) + ' L ' + (cx+16) + ' ' + y + ' Z" fill="' + fill + '" />';
  }

  function scatterStickers(spots, accent){
    return spots.map((s, i) => '<text x="' + s.x + '" y="' + s.y + '" font-size="' + s.size + '" fill="' + accent + '" opacity="0.55">' + STAR_GLYPHS[i % STAR_GLYPHS.length] + '</text>').join('');
  }

  function buildInfographicSvg(data, templateId){
    const pal = PALETTES[templateId] || PALETTES.general;
    const W = 800;
    const points = (data.points || []).slice(0, 5);

    // ---- pre-measure dynamic heights ----
    const titleLines = wrapLines(data.title || '', '700 44px "ZCOOL KuaiLe"', 480, 2);
    const subtitleLines = wrapLines(data.subtitle || '', '500 22px "Noto Sans TC"', 560, 2);
    const pointLineData = points.map(p => wrapLines(p.text || '', '500 25px "Noto Sans TC"', 460, 2));
    const rowHeights = pointLineData.map(lines => lines.length > 1 ? 78 : 56);
    const cloudA_h = 76 + rowHeights.reduce((a,b)=>a+b+14, 0) + 26;

    const actionLines = data.action ? wrapLines(data.action, '600 23px "Noto Sans TC"', 500, 2) : [];
    const actionBoxH = data.action ? (54 + (actionLines.length-1)*28) : 0;
    const cloudB_h = 70 + (data.action ? actionBoxH + 22 : 0) + 58 + 20;

    const headerH = 214;
    const bubbleH = 64 + (subtitleLines.length>1 ? 26 : 0);
    let y = headerH - 16;
    const bubbleY = y;
    y += bubbleH + 26;
    const cloudAY = y;
    y += cloudA_h + 26;
    const cloudBY = y;
    y += cloudB_h + 50;
    const H = y;

    // ---- header: rainbow diagonal stripes ----
    const stripeColors = pal.headerStripes;
    const stripeW = W / (stripeColors.length - 1.6);
    let stripes = '';
    for(let i=0;i<stripeColors.length;i++){
      const x0 = i*stripeW - 60;
      stripes += '<polygon points="' + x0 + ',0 ' + (x0+stripeW+60) + ',0 ' + (x0+stripeW-40) + ',' + headerH + ' ' + (x0-100) + ',' + headerH + '" fill="' + stripeColors[i] + '" />';
    }

    // ---- points inside cloud A ----
    let pointsSvg = '';
    let rowY = cloudAY + 70;
    points.forEach((p, i) => {
      const lines = pointLineData[i];
      const rh = rowHeights[i];
      pointsSvg += '<g>' +
        '<circle cx="' + (86) + '" cy="' + (rowY + rh/2 - 8) + '" r="27" fill="#FFFFFF" />' +
        '<text x="86" y="' + (rowY + rh/2 - 8 + 9) + '" font-size="26" text-anchor="middle">' + esc(p.emoji || '✦') + '</text>' +
        lines.map((ln, li) => '<text x="126" y="' + (rowY + 24 + li*30) + '" font-family="Noto Sans TC" font-size="24" font-weight="600" fill="' + pal.ink + '">' + esc(ln) + '</text>').join('') +
      '</g>';
      rowY += rh + 14;
    });

    // ---- action + tags inside cloud B ----
    let actionSvg = '';
    let afterActionY = cloudBY + 66;
    if(data.action){
      actionSvg = '<g>' +
        '<rect x="60" y="' + afterActionY + '" width="' + (W-120) + '" height="' + actionBoxH + '" rx="18" fill="' + pal.accent + '" />' +
        '<text x="86" y="' + (afterActionY+32) + '" font-size="20" fill="#fff" font-weight="700">👉 行動</text>' +
        actionLines.map((ln,li) => '<text x="86" y="' + (afterActionY+58+li*28) + '" font-family="Noto Sans TC" font-size="21" fill="#fff" font-weight="600">' + esc(ln) + '</text>').join('') +
      '</g>';
      afterActionY += actionBoxH + 22;
    }
    let tagsSvg = '';
    let tx = 60;
    (data.tags || []).slice(0,4).forEach((t, i) => {
      measureCtx.font = '600 17px "Noto Sans TC"';
      const w = measureCtx.measureText(t).width + 32;
      const color = pal.tagPalette[i % pal.tagPalette.length];
      tagsSvg += '<rect x="' + tx + '" y="' + afterActionY + '" width="' + w + '" height="34" rx="17" fill="' + color + '" />' +
        '<text x="' + (tx+16) + '" y="' + (afterActionY+22) + '" font-family="Noto Sans TC" font-size="16" font-weight="600" fill="#fff">' + esc(t) + '</text>';
      tx += w + 8;
    });

    return '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" font-family="Noto Sans TC">' +
      '<defs>' +
        '<linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0" stop-color="' + pal.bg1 + '" /><stop offset="1" stop-color="' + pal.bg2 + '" />' +
        '</linearGradient>' +
        '<filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.10"/></filter>' +
        '<clipPath id="headerClip"><rect x="0" y="0" width="' + W + '" height="' + headerH + '" /></clipPath>' +
      '</defs>' +
      '<rect width="' + W + '" height="' + H + '" fill="url(#pageGrad)" />' +
      '<g clip-path="url(#headerClip)">' + stripes + '</g>' +
      scatterStickers(STICKER_SPOTS, pal.accent) +
      drawMascot(W-92, headerH-96, 46, '#FFFFFF') +
      titleLines.map((ln, i) => '<text x="' + (W/2 - 40) + '" y="' + (86 + i*52) + '" text-anchor="middle" font-family="ZCOOL KuaiLe" font-size="44" fill="' + pal.ink + '">' + esc(ln) + '</text>').join('') +
      '<text x="' + (W/2) + '" y="' + (headerH+30) + '" text-anchor="middle" font-size="46">' + esc(data.emoji || '📝') + '</text>' +
      speechBubble(70, bubbleY, W-140, bubbleH, '#FFFFFF') +
      (subtitleLines.length ? subtitleLines.map((ln,i) => '<text x="' + (W/2) + '" y="' + (bubbleY + 34 + i*28) + '" text-anchor="middle" font-family="Noto Sans TC" font-size="21" font-weight="600" fill="' + pal.ink + '">' + esc(ln) + '</text>').join('') : '') +
      cloudPanel(40, cloudAY, W-80, cloudA_h, pal.cloudA) +
      '<text x="70" y="' + (cloudAY+42) + '" font-family="ZCOOL KuaiLe" font-size="26" fill="' + pal.accent + '">✨ 重點內容</text>' +
      pointsSvg +
      cloudPanel(40, cloudBY, W-80, cloudB_h, pal.cloudB) +
      '<text x="70" y="' + (cloudBY+40) + '" font-family="ZCOOL KuaiLe" font-size="26" fill="' + pal.accent + '">💡 重點提醒</text>' +
      actionSvg +
      tagsSvg +
      '<text x="' + (W/2) + '" y="' + (H-16) + '" text-anchor="middle" font-family="Noto Sans TC" font-size="14" fill="#B9B2A4">🎙️ 錄音筆記</text>' +
    '</svg>';
  }
  function renderInfographicFromRecord(){
    if(currentRecord && currentRecord.infographicSvg){
      infographicWrap.innerHTML = currentRecord.infographicSvg;
      downloadInfographicBtn.style.display = 'inline-block';
    } else {
      infographicWrap.innerHTML = '<div class="info-empty">撳「生成可愛資訊圖」，將摘要變做一張可愛小卡片，啱晒放IG Story或者傳畀學員／客戶。</div>';
      downloadInfographicBtn.style.display = 'none';
    }
  }

  // Offscreen canvas for text measurement so lines wrap correctly regardless of length
  const measureCanvas = document.createElement('canvas');
  const measureCtx = measureCanvas.getContext('2d');
  function wrapLines(text, font, maxWidth, maxLines){
    measureCtx.font = font;
    const chars = Array.from(text || '');
    const lines = [];
    let line = '';
    for(const ch of chars){
      const test = line + ch;
      if(measureCtx.measureText(test).width > maxWidth && line){
        lines.push(line);
        line = ch;
        if(lines.length === maxLines - 1){
          // last allowed line: fit remaining chars, truncate with ellipsis if needed
          let rest = line + chars.slice(chars.indexOf(ch)+1).join('');
          while(measureCtx.measureText(rest + '…').width > maxWidth && rest.length > 1){
            rest = rest.slice(0, -1);
          }
          lines.push(chars.indexOf(ch) + 1 < chars.length ? rest + '…' : rest);
          return lines;
        }
      } else {
        line = test;
      }
    }
    if(line) lines.push(line);
    return lines.slice(0, maxLines);
  }

  function esc(s){ return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function buildInfographicSvg(data, templateId){
    const pal = PALETTES[templateId] || PALETTES.general;
    const W = 800, H = 1000;
    const points = (data.points || []).slice(0, 5);
    let y = 330;
    const rowH = 92;
    const titleLines = wrapLines(data.title || '', '700 46px "ZCOOL KuaiLe"', 560, 2);

    let pointsSvg = '';
    points.forEach((p, i) => {
      const lines = wrapLines(p.text || '', '500 26px "Noto Sans TC"', 470, 2);
      const rowY = y + i * rowH;
      pointsSvg += '<g>' +
        '<circle cx="96" cy="' + (rowY+18) + '" r="30" fill="' + pal.blob[i % pal.blob.length] + '" />' +
        '<text x="96" y="' + (rowY+29) + '" font-size="28" text-anchor="middle">' + esc(p.emoji || '✦') + '</text>' +
        '<rect x="146" y="' + rowY + '" width="560" height="' + (lines.length>1?68:44) + '" rx="16" fill="#FBFAF6" />' +
        lines.map((ln, li) => '<text x="168" y="' + (rowY + 29 + li*30) + '" font-family="Noto Sans TC" font-size="24" font-weight="600" fill="#3A362F">' + esc(ln) + '</text>').join('') +
      '</g>';
    });

    const afterPointsY = y + points.length * rowH + 10;
    let actionSvg = '';
    if(data.action){
      const actionLines = wrapLines(data.action, '600 24px "Noto Sans TC"', 520, 2);
      const boxH = 50 + (actionLines.length-1)*30;
      actionSvg = '<g>' +
        '<rect x="70" y="' + afterPointsY + '" width="660" height="' + boxH + '" rx="20" fill="' + pal.accent + '" />' +
        '<text x="98" y="' + (afterPointsY+34) + '" font-size="22" fill="#fff" font-weight="700">👉 行動</text>' +
        actionLines.map((ln,li) => '<text x="98" y="' + (afterPointsY+64+li*30) + '" font-family="Noto Sans TC" font-size="22" fill="#fff" font-weight="600">' + esc(ln) + '</text>').join('') +
      '</g>';
    }

    const tagsY = afterPointsY + (data.action ? (70 + ((wrapLines(data.action,'600 24px "Noto Sans TC"',520,2).length-1)*30)) : 20);
    let tagsSvg = '';
    let tx = 70;
    (data.tags || []).slice(0,4).forEach((t) => {
      measureCtx.font = '600 18px "Noto Sans TC"';
      const w = measureCtx.measureText(t).width + 34;
      tagsSvg += '<rect x="' + tx + '" y="' + tagsY + '" width="' + w + '" height="36" rx="18" fill="' + pal.accent2 + '" opacity="0.85" />' +
        '<text x="' + (tx+17) + '" y="' + (tagsY+24) + '" font-family="Noto Sans TC" font-size="18" font-weight="600" fill="#fff">' + esc(t) + '</text>';
      tx += w + 10;
    });

    return '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" font-family="Noto Sans TC">' +
      '<defs>' +
        '<linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">' +
          '<stop offset="0" stop-color="' + pal.bg1 + '" />' +
          '<stop offset="1" stop-color="' + pal.bg2 + '" />' +
        '</linearGradient>' +
        '<filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.10"/></filter>' +
      '</defs>' +
      '<rect width="' + W + '" height="' + H + '" fill="url(#bgGrad)" />' +
      '<circle cx="70" cy="80" r="60" fill="' + pal.blob[0] + '" opacity="0.6" />' +
      '<circle cx="730" cy="130" r="40" fill="' + pal.blob[1] + '" opacity="0.6" />' +
      '<circle cx="750" cy="920" r="70" fill="' + pal.blob[2] + '" opacity="0.55" />' +
      '<rect x="36" y="36" width="' + (W-72) + '" height="' + (H-72) + '" rx="36" fill="' + pal.card + '" filter="url(#soft)" />' +
      '<text x="' + (W/2) + '" y="150" font-size="64" text-anchor="middle">' + esc(data.emoji || '📝') + '</text>' +
      titleLines.map((ln, i) => '<text x="' + (W/2) + '" y="' + (230 + i*54) + '" text-anchor="middle" font-family="ZCOOL KuaiLe" font-size="46" fill="' + pal.accent + '">' + esc(ln) + '</text>').join('') +
      pointsSvg +
      actionSvg +
      tagsSvg +
      '<text x="' + (W/2) + '" y="' + (H-30) + '" text-anchor="middle" font-family="Noto Sans TC" font-size="15" fill="#B9B2A4">🎙️ 錄音筆記</text>' +
    '</svg>';
  }

  genInfographicBtn.addEventListener('click', async () => {
    const sourceText = currentRecord.summary || currentRecord.transcript;
    if(!sourceText){ alert('呢節記錄未有摘要或逐字稿內容。'); return; }
    genInfographicBtn.disabled = true;
    infographicLoading.style.display = 'block';
    try{
      const raw = await callClaude(
        '請將以下內容整理成一個「得意資訊圖卡」嘅資料，用廣東話，用純JSON格式回覆，唔好加任何前言、解釋或markdown符號（例如```）。JSON格式如下：\n' +
        '{"emoji":"一個代表主題嘅emoji","title":"標題，最多10個中文字","subtitle":"一句副標題／引言，最多20個中文字","points":[{"emoji":"emoji","text":"重點，最多16個中文字"}，共3至5項],"action":"一句行動項目，最多20個中文字，如果冇就用null","tags":["最多4個標籤，每個最多6個中文字"]}\n\n內容：\n' + sourceText
      );
      const cleaned = raw.replace(/```json|```/g, '').trim();
      const data = JSON.parse(cleaned);
      const svg = buildInfographicSvg(data, currentRecord.templateId);
      infographicWrap.innerHTML = svg;
      currentRecord.infographicSvg = svg;
      await persistRecord();
      downloadInfographicBtn.style.display = 'inline-block';
    }catch(e){
      console.error(e);
      infographicWrap.innerHTML = '<div class="info-empty">生成失敗，請再試一次。</div>';
    }finally{
      infographicLoading.style.display = 'none';
      genInfographicBtn.disabled = false;
    }
  });

  downloadInfographicBtn.addEventListener('click', () => {
    const svgEl = infographicWrap.querySelector('svg');
    if(!svgEl) return;
    const viewBox = (svgEl.getAttribute('viewBox') || '0 0 800 1000').split(' ').map(Number);
    const vbW = viewBox[2] || 800, vbH = viewBox[3] || 1000;
    const svgData = new XMLSerializer().serializeToString(svgEl);
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      const scale = 2;
      const canvas = document.createElement('canvas');
      canvas.width = vbW * scale; canvas.height = vbH * scale;
      const c2d = canvas.getContext('2d');
      c2d.scale(scale, scale);
      c2d.drawImage(img, 0, 0, vbW, vbH);
      URL.revokeObjectURL(url);
      canvas.toBlob((blob) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = (currentRecord.title || 'infographic') + '.png';
        document.body.appendChild(a); a.click(); a.remove();
      });
    };
    img.src = url;
  });

  copyBtn.addEventListener('click', () => {
    const text = (currentRecord.summary ? ('【摘要】\n'+currentRecord.summary+'\n\n') : '') + '【逐字稿】\n' + currentRecord.transcript;
    navigator.clipboard.writeText(text).then(() => { copyBtn.textContent = '已複製 ✓'; setTimeout(()=>copyBtn.textContent='複製摘要', 1500); });
  });

  deleteBtn.addEventListener('click', async () => {
    if(!confirm('確定要刪除呢節記錄？呢個操作冇得返轉頭。')) return;
    try{ await window.storage.delete(currentRecord.id, false); showView('library'); renderLibrary(); }
    catch(e){ alert('刪除失敗：' + (e.message||e)); }
  });

  // ================= Init =================
  renderLibrary();
})();
</script>
