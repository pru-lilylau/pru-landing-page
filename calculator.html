<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保險需要計算器 | Lily Lau @pru_lilylau</title>
<meta name="description" content="免費保險需要計算器，即時估算危疾、醫療及儲蓄保障缺口，附保誠產品建議。">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: 16px;
    background: #F7F3EE;
    color: #2C2C2A;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(160deg, #F5EDE0 0%, #EDD9C0 100%);
    padding: 1.5rem 1.5rem 1.25rem;
    text-align: center;
    border-bottom: 0.5px solid #E8DDD0;
  }
  .header-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    object-fit: cover; object-position: center top;
    display: block;
    margin: 0 auto 0.6rem;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-name { font-size: 18px; font-weight: 600; color: #3D2B1A; margin-bottom: 3px; }
  .header-sub { font-size: 14px; color: #8B6347; }
  .header-badges { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 0.6rem; }
  .hbadge { font-size: 12px; padding: 3px 11px; border-radius: 20px; font-weight: 500; }
  .hb-cpa { background: #E8D5BE; color: #7A4F2A; }
  .hb-ins { background: #D6E8D5; color: #2A5A2E; }

  /* ── Two-column layout ── */
  .page-body {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    align-items: start;
  }
  .col-left { display: flex; flex-direction: column; gap: 1rem; }
  .col-right { display: flex; flex-direction: column; gap: 1rem; position: sticky; top: 1.25rem; }

  /* ── Cards ── */
  .card {
    background: #fff;
    border: 0.5px solid #E8DDD0;
    border-radius: 14px;
    padding: 1.25rem;
  }

  .section-title {
    font-size: 15px; font-weight: 700; color: #3D2B1A;
    letter-spacing: .01em;
    margin-bottom: 1.1rem;
  }

  /* ── Form rows ── */
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .row:last-child { margin-bottom: 0; }
  .row label { font-size: 15px; color: #6B4E35; width: 110px; flex-shrink: 0; }
  .row input[type=range] {
    flex: 1; height: 4px; border-radius: 2px;
    -webkit-appearance: none; appearance: none;
    background: #E8DDD0; outline: none; cursor: pointer;
  }
  .row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: #C9956B; cursor: pointer;
    border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .row .val { font-size: 15px; font-weight: 500; color: #3D2B1A; min-width: 85px; text-align: right; }

  .seg { display: flex; gap: 5px; flex: 1; flex-wrap: wrap; }
  .seg.multi button { border-radius: 8px; }
  .seg button {
    font-size: 13px; padding: 5px 12px; border-radius: 20px;
    border: 0.5px solid #D8C9BA;
    background: #FFFCF8; color: #8B6347; cursor: pointer;
    font-family: inherit; transition: all .15s;
  }
  .seg button.active { background: #C9956B; border-color: #C9956B; color: #fff; }

  /* ── Results metrics ── */
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .metric { background: #FBF8F4; border-radius: 10px; padding: 0.8rem 1rem; }
  .metric-label { font-size: 12px; color: #A08060; margin-bottom: 4px; }
  .metric-val { font-size: 20px; font-weight: 600; color: #3D2B1A; }
  .metric-sub { font-size: 11px; color: #B8A090; margin-top: 2px; }

  /* ── Gap bars ── */
  .gap-row { margin-bottom: 11px; }
  .gap-row:last-child { margin-bottom: 0; }
  .gap-bar-label { display: flex; justify-content: space-between; font-size: 13px; color: #8B6347; margin-bottom: 5px; }
  .gap-bar-track { height: 8px; background: #F0E8DF; border-radius: 4px; overflow: hidden; }
  .gap-bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }

  /* ── Product recommendations (right col) ── */
  .rec-title {
    font-size: 15px; font-weight: 600; color: #3D2B1A;
    margin-bottom: 0.9rem;
    display: flex; align-items: center; gap: 7px;
  }
  .rec-title svg { width: 18px; height: 18px; flex-shrink: 0; }

  .prod-card {
    background: #FFFCF8; border: 0.5px solid #E8DDD0;
    border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: 0.7rem;
  }
  .prod-card:last-child { margin-bottom: 0; }
  .prod-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 7px; }
  .prod-name-zh { font-size: 15px; font-weight: 500; color: #3D2B1A; line-height: 1.4; }
  .prod-name-en { font-size: 11px; color: #B8A090; margin-top: 2px; font-style: italic; }
  .prod-cat { font-size: 11px; padding: 3px 9px; border-radius: 10px; font-weight: 500; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .cat-ci { background: #FCEBEB; color: #A32D2D; }
  .cat-med { background: #E6F1FB; color: #0C447C; }
  .cat-life { background: #EAF3DE; color: #27500A; }
  .cat-save { background: #FAEEDA; color: #633806; }
  .prod-desc { font-size: 13px; color: #8B6347; line-height: 1.6; margin-bottom: 8px; }
  .prod-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .prod-tag { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #F0E8DF; color: #8B6347; }
  .prod-why { font-size: 13px; color: #7A4F2A; background: #FBF8F4; border-radius: 6px; padding: 8px 10px; border: 0.5px solid #E8DDD0; line-height: 1.55; }

  .no-gap { font-size: 15px; color: #8B6347; padding: 1rem; background: #FBF8F4; border-radius: 10px; text-align: center; }

  /* ── Child section ── */
  .child-block { margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid #F0E8DF; }
  .child-block-title { font-size: 13px; font-weight: 600; color: #C9956B; margin-bottom: 0.7rem; }
  .child-gap-section { margin-top: 1rem; }
  .child-gap-title { font-size: 13px; font-weight: 600; color: #8B6347; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 6px; }

  /* ── CTA ── */
  .cta-card {
    background: linear-gradient(160deg, #F5EDE0 0%, #EDD9C0 100%);
    border: 0.5px solid #E8DDD0; border-radius: 14px;
    padding: 1.1rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .cta-text strong { display: block; font-size: 16px; font-weight: 500; color: #3D2B1A; margin-bottom: 3px; }
  .cta-text p { font-size: 14px; color: #6B4E35; line-height: 1.5; }
  .cta-btn {
    background: #C9956B; color: #fff; border: none;
    font-size: 15px; font-weight: 500; padding: 10px 20px;
    border-radius: 22px; cursor: pointer; white-space: nowrap;
    font-family: inherit; text-decoration: none; display: inline-block;
    transition: background .15s;
  }
  .cta-btn:hover { background: #B8845A; }

  .footer { text-align: center; font-size: 12px; color: #B8A090; padding: 0 1rem 2rem; line-height: 1.7; }

  /* ── WhatsApp Summary Button ── */
  .wa-summary-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    width: 100%;
    margin-top: 1.2rem;
    padding: 0.85rem 1rem;
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.01em;
    font-family: inherit;
    transition: background 0.18s, transform 0.12s;
  }
  .wa-summary-btn:hover { background: #1ebe5d; transform: translateY(-1px); }
  .wa-summary-btn:active { background: #17a850; transform: translateY(0); }

  /* ── Fixed WhatsApp FAB ── */
  @keyframes wa-float {
    0%,100% { transform: translateY(0); box-shadow: 0 4px 16px rgba(37,211,102,0.4); }
    50%      { transform: translateY(-7px); box-shadow: 0 12px 28px rgba(37,211,102,0.32); }
  }
  .wa-fab {
    position: fixed;
    bottom: 1.25rem;
    right: 1.25rem;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px; height: 52px;
    background: #25D366;
    color: #fff;
    text-decoration: none;
    border-radius: 50%;
    animation: wa-float 2.8s ease-in-out infinite;
  }
  .wa-fab:hover {
    background: #1ebc5a;
    animation-play-state: paused;
  }
  .wa-fab svg {
    width: 26px; height: 26px;
  }

  /* ── Mobile: single column ── */
  @media (max-width: 720px) {
    .page-body { grid-template-columns: 1fr; }
    .col-right { position: static; }
    .row label { width: 95px; font-size: 14px; }
    .row .val { font-size: 14px; min-width: 75px; }
  }
</style>
</head>

  {
    cat:'med', catLabel:'醫療', catClass:'cat-med',
    nameZh:'保誠自願醫保尚賓計劃',
    nameEn:'PRUHealth VHIS VIP Plan',
    desc:'政府認可 VHIS 靈活計劃，每年保障上限達1,200萬港元，終身保障上限5,600萬港元。主要醫療費用不設個別保障限額，合資格保費可申請稅務扣減。',
    tags:['VHIS 認可','稅務扣減','不設個別限額','終身續保'],
    trigger: g => g.medScore < 70,
    why: g => `你現時醫療保障${g.medSet.size===0?'空白':g.medSet.has('company')&&g.medSet.size===1?'只靠公司醫療，離職或退休後即失保':'偏薄'}，VHIS 尚賓計劃保費可扣稅（每人上限 $8,000），作為會計師我特別建議善用呢個稅務優惠。`
  },
  {
    cat:'life', catLabel:'人壽', catClass:'cat-life',
    nameZh:'「守護家人」定期人壽保',
    nameEn:'PRUTerm Family Protector',
    desc:'以相宜保費提供充裕人壽保障，可因應家庭責任增加靈活提高保額。設有4個可續保期，並保證可轉換為終身壽險計劃，毋須提供健康證明。',
    tags:['低保費高保額','靈活提高保障','4個可續保期','保證轉換全保'],
    trigger: g => g.dep > 0 && g.lifePct < 70,
    why: g => `你有 ${g.dep} 位家庭成員依賴你，人壽缺口約 ${fmt(g.lifeGap)}，「守護家人」定期人壽保係最具成本效益的方案保障家人。`
  },
  {
    cat:'save', catLabel:'儲蓄', catClass:'cat-save',
    nameZh:'保誠信守明天多元貨幣計劃',
    nameEn:'Prudential Entrust Multi-Currency Plan',
    desc:'全方位多元貨幣儲蓄及終身人壽保險計劃，提供高潛在回報、靈活貨幣轉換及自主入息選項，並具備保單分拆及財富傳承規劃工具。',
    tags:['多元貨幣','自主入息','保單分拆','財富傳承'],
    trigger: g => g.savPct < 50 && g.income >= 30000,
    why: g => `你的退休儲蓄目標尚有 ${fmt(g.savingsGap)} 缺口，信守明天計劃以複息增值配合多貨幣靈活配置，適合長遠財富規劃。`
  },
  {
    cat:'save', catLabel:'儲蓄', catClass:'cat-save',
    nameZh:'世譽財富',
    nameEn:'Prime Eternity',
    desc:'一筆過保費儲蓄計劃，保單開始時保證現金價值相當於85%已付保費，並透過非保證終期紅利持續增長。設有財富分拆選項及靈活傳承安排。',
    tags:['一筆過保費','85%保證現金價值','財富分拆選項','靈活傳承'],
    trigger: g => g.savPct < 30 && g.age <= 50,
    why: g => `${g.age} 歲一筆過投入世譽財富（Prime Eternity），保單即時生效，保證現金價值加非保證終期紅利持續增長，適合財富傳承規劃。`
  }
];

function fmt(n) {
  if (!n) return '$0';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (n >= 10000) return '$' + Math.round(n/10000) + '萬';
  return '$' + n.toLocaleString();
}

function toggleMed(val, btn) {
  if (state.medSet.has(val)) {
    state.medSet.delete(val);
    btn.classList.remove('active');
  } else {
    state.medSet.add(val);
    btn.classList.add('active');
  }
  calc();
}

function getMedScore() {
  const s = state.medSet;
  if (s.has('high')) return 100;
  if (s.has('basic')) return s.has('company') ? 75 : 55;
  if (s.has('company')) return 35;
  return 0;
}

function getMedLabel() {
  const s = state.medSet;
  if (s.size === 0) return '未有醫療保障';
  const map = {company:'公司醫療', basic:'基本醫療', high:'高端醫療'};
  return [...s].map(v => map[v]).join(' + ');
}

function getMedSubLabel() {
  const s = state.medSet;
  if (s.size === 0) return '未有保障';
  if (s.has('high')) return '高端保障';
  if (s.has('basic')) return '基本保障';
  return '公司醫療';
}

function setSeg(key, btn) {
  state[key] = btn.dataset.v;
  btn.closest('.seg').querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (key === 'hasChild') {
    const show = btn.dataset.v === 'yes';
    document.getElementById('child-details').style.display = show ? '' : 'none';
    if (show) renderChildInputs();
  }
  if (key === 'childCount') renderChildInputs();
  calc();
}

function renderChildInputs() {
  const n = +state.childCount;
  const container = document.getElementById('child-inputs');
  // preserve existing values
  const prev = state.children || [];
  state.children = Array.from({length: n}, (_, i) => prev[i] || { age: 5, ci: 0, medSet: new Set() });
  container.innerHTML = state.children.map((c, i) => `
    <div class="child-block">
      <div class="child-block-title">👶 子女 ${i+1}</div>
      <div class="row">
        <label>年齡</label>
        <input type="range" id="c${i}-age" min="0" max="17" value="${c.age}" step="1" oninput="updateChild(${i},'age',+this.value);document.getElementById('c${i}-age-out').textContent=this.value+' 歲'">
        <span class="val" id="c${i}-age-out">${c.age} 歲</span>
      </div>
      <div class="row">
        <label>危疾保額</label>
        <input type="range" id="c${i}-ci" min="0" max="3000000" value="${c.ci}" step="50000" oninput="updateChild(${i},'ci',+this.value);document.getElementById('c${i}-ci-out').textContent='$'+Number(this.value).toLocaleString('en-US')">
        <span class="val" id="c${i}-ci-out">$${Number(c.ci).toLocaleString('en-US')}</span>
      </div>
      <div class="row">
        <label>醫療計劃</label>
        <div class="seg multi" id="c${i}-med-seg">
          <button data-v="company" onclick="toggleChildMed(${i},'company',this)" \${c.medSet&&c.medSet.has('company')?'class="active"':''}>公司</button>
          <button data-v="basic" onclick="toggleChildMed(${i},'basic',this)" \${c.medSet&&c.medSet.has('basic')?'class="active"':''}>基本</button>
          <button data-v="high" onclick="toggleChildMed(${i},'high',this)" \${c.medSet&&c.medSet.has('high')?'class="active"':''}>高端</button>
        </div>
      </div>
    </div>`).join('');
}

function toggleChildMed(i, val, btn) {
  if (!state.children[i].medSet) state.children[i].medSet = new Set();
  const s = state.children[i].medSet;
  if (s.has(val)) { s.delete(val); btn.classList.remove('active'); }
  else { s.add(val); btn.classList.add('active'); }
  calc();
}

function updateChild(i, key, val) {
  state.children[i][key] = val;
  calc();
}

function calc() {
  const age = +document.getElementById('age').value;
  const income = +document.getElementById('income').value;
  const savings = +document.getElementById('savings').value;
  const ciHave = +document.getElementById('ci-have').value;
  const lifeHave = +document.getElementById('life-have').value;
  const dep = +state.dep;
  const medScore = getMedScore();
  const med = [...state.medSet];

  const annualIncome = income * 12;
  const years = Math.max(65 - age, 10);
  const ciNeed = annualIncome * 5;
  const lifeNeed = dep > 0 ? annualIncome * (dep + 2) : 0;
  const savingsNeed = Math.round(income * 0.15) * 12 * 20;
  const ciGap = Math.max(0, ciNeed - ciHave);
  const lifeGap = Math.max(0, lifeNeed - lifeHave);
  const savingsGap = Math.max(0, savingsNeed - savings);
  // medScore already computed above
  const ciPct = Math.min(100, Math.round(ciHave / Math.max(ciNeed,1) * 100));
  const lifePct = dep > 0 ? Math.min(100, Math.round(lifeHave / Math.max(lifeNeed,1) * 100)) : 100;
  const savPct = Math.min(100, Math.round(savings / Math.max(savingsNeed,1) * 100));

  document.getElementById('results').innerHTML = `
    <div class="metric"><div class="metric-label">危疾建議保額</div><div class="metric-val">${fmt(ciNeed)}</div><div class="metric-sub">年入 × 5 倍</div></div>
    <div class="metric"><div class="metric-label">人壽建議保額</div><div class="metric-val">${dep>0?fmt(lifeNeed):'—'}</div><div class="metric-sub">${dep>0?'有家庭負擔':'暫無需要'}</div></div>
    <div class="metric"><div class="metric-label">醫療保障程度</div><div class="metric-val">${medScore}%</div><div class="metric-sub">${getMedSubLabel()}</div></div>
    <div class="metric"><div class="metric-label">退休儲蓄目標</div><div class="metric-val">${fmt(savingsNeed)}</div><div class="metric-sub">${years} 年後退休目標</div></div>
  `;

  const bc = p => p >= 80 ? '#639922' : p >= 40 ? '#EF9F27' : '#E24B4A';
  document.getElementById('gaps').innerHTML = [
    ['危疾保障', ciPct, fmt(ciGap)],
    ['人壽保障', lifePct, dep===0?'(無需要)':'缺口 '+fmt(lifeGap)],
    ['醫療保障', medScore, '保障程度'],
    ['退休儲蓄', savPct, '缺口 '+fmt(savingsGap)]
  ].map(([l,p,s])=>`
    <div class="gap-row">
      <div class="gap-bar-label"><span>${l}</span><span>${p}% · ${s}</span></div>
      <div class="gap-bar-track"><div class="gap-bar-fill" style="width:${p}%;background:${bc(p)}"></div></div>
    </div>`).join('');

  // Child gaps
  let childGapsHtml = '';
  if (state.hasChild === 'yes' && state.children.length > 0) {
    const CI_CHILD_NEED = 1000000;
    const EDU_COST_PER_YEAR = 200000; // HK uni + living
    const bc2 = p => p >= 80 ? '#639922' : p >= 40 ? '#EF9F27' : '#E24B4A';
    childGapsHtml = '<div class="child-gap-section">';
    state.children.forEach((c, i) => {
      const ciChildGap = Math.max(0, CI_CHILD_NEED - c.ci);
      const ciChildPct = Math.min(100, Math.round(c.ci / CI_CHILD_NEED * 100));
      const cms = c.medSet || new Set();
      const medChildScore = cms.has('high') ? 100 : cms.has('basic') ? (cms.has('company') ? 75 : 55) : cms.has('company') ? 35 : 0;
      const yearsToUni = Math.max(0, 18 - c.age);
      const eduNeed = EDU_COST_PER_YEAR * 4;
      const childLabel = `👶 子女 ${i+1}（${c.age} 歲）`;
      childGapsHtml += `<div class="child-gap-title">${childLabel}</div>`;
      childGapsHtml += [
        ['危疾保障', ciChildPct, ciChildGap > 0 ? '缺口 '+fmt(ciChildGap) : '足夠'],
        ['醫療保障', medChildScore, '保障程度'],
        ['教育儲備', 0, '大學需約 '+fmt(eduNeed)+'（'+yearsToUni+'年後）'],
      ].map(([l,p,s])=>`
        <div class="gap-row">
          <div class="gap-bar-label"><span>${l}</span><span>${p > 0 ? p+'% · ' : ''}${s}</span></div>
          ${p > 0 ? `<div class="gap-bar-track"><div class="gap-bar-fill" style="width:${p}%;background:${bc2(p)}"></div></div>` : ''}
        </div>`).join('');
    });
    childGapsHtml += '</div>';
  }
  document.getElementById('child-gaps').innerHTML = childGapsHtml;

  const g = {ciPct,ciGap,lifePct,lifeGap,savPct,savingsGap,medScore,dep,income,age,medSet:state.medSet};
  const matched = PRODUCTS.filter(p => p.trigger(g));

  document.getElementById('recommendations').innerHTML = matched.length === 0
    ? `<div class="no-gap">你的保障規劃已相當完善！建議定期檢視保單。</div>`
    : matched.map(p=>`
      <div class="prod-card">
        <div class="prod-header">
          <div>
            <div class="prod-name-zh">${p.nameZh}</div>
            <div class="prod-name-en">${p.nameEn}</div>
          </div>
          <span class="prod-cat ${p.catClass}">${p.catLabel}</span>
        </div>
        <div class="prod-desc">${p.desc}</div>
        <div class="prod-tags">${p.tags.map(t=>`<span class="prod-tag">${t}</span>`).join('')}</div>
        <div class="prod-why">${p.why(g)}</div>
      </div>`).join('');
}

['age','income','savings','ci-have','life-have'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    const v=+this.value;
    const o=document.getElementById(id+'-out');
    if(id==='age') o.textContent=v+' 歲';
    else o.textContent='$'+v.toLocaleString();
    calc();
  });
});

function sendSummaryToWhatsApp() {
  var clientName = document.getElementById('client-name').value.trim();
  var age = +document.getElementById('age').value;
  var income = +document.getElementById('income').value;
  var dep = +state.dep;
  var gender = state.gender;
  var ciHave = +document.getElementById('ci-have').value;
  var savings = +document.getElementById('savings').value;
  var annualIncome = income * 12;
  var ciNeed = annualIncome * 5;
  var ciGap = Math.max(0, ciNeed - ciHave);
  var ciPct = Math.min(100, Math.round(ciHave / Math.max(ciNeed,1) * 100));
  var savingsNeed = Math.round(income * 0.15) * 12 * 20;
  var savingsGap = Math.max(0, savingsNeed - savings);
  var medLabel = getMedLabel() + (state.medSet.has('company') && state.medSet.size === 1 ? '（離職後失保）' : '');
  var genderLabel = gender === 'male' ? '男' : '女';
  var nameLine = clientName ? '👤 稱呼：' + clientName + '\n' : '';
  var childLines = '';
  if (state.hasChild === 'yes' && state.children && state.children.length > 0) {
    var CI_CHILD_NEED = 1000000;
    var EDU_COST_PER_YEAR = 200000;
    var childMedMap = {company:'公司醫療',basic:'基本',high:'高端'};
    childLines = '\n' + state.children.map(function(c, i) {
      var cms = c.medSet || new Set();
      var ciChildGap = Math.max(0, CI_CHILD_NEED - c.ci);
      var yearsToUni = Math.max(0, 18 - c.age);
      var medChildLabel = cms.size === 0 ? '未有' : Array.from(cms).map(function(v){ return childMedMap[v]||v; }).join('+');
      return '👶 子女'+(i+1)+'（'+c.age+'歲）：危疾缺口 '+fmt(ciChildGap)+' ｜ 醫療：'+medChildLabel+' ｜ 教育儲備：'+fmt(EDU_COST_PER_YEAR*4)+'（'+yearsToUni+'年後）';
    }).join('\n');
  }
  var lines = [
    '你好 Lily，以下係我嘅保險需要分析結果：',
    '',
    nameLine + '⚧ 性別：' + genderLabel,
    '🎂 年齡：' + age + ' 歲｜月入：' + fmt(income),
    '👨‍👩‍👧 家庭負擔：' + (dep === 0 ? '暫無' : dep + ' 人') + childLines,
    '📊 危疾缺口：' + fmt(ciGap) + '（現有保障 ' + ciPct + '%）',
    '🏥 醫療保障：' + medLabel,
    '💰 退休儲蓄缺口：' + fmt(savingsGap),
    '📌 想了解更多，請問可以聯絡你嗎？'
  ];
  var msg = lines.join('\n');
  var url = 'https://wa.me/85260133108?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}

calc();
</script>
